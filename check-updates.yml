name: FlyScout Rule Check

# Runs the detection script on a schedule. GitHub executes this for you —
# nothing to install, nothing to run locally, nothing to keep alive.
#
# Schedule below runs 3x/day (every 8 hours). Adjust the cron expression to
# change frequency. You can also trigger a run manually from the Actions tab
# (workflow_dispatch).
on:
  schedule:
    - cron: "0 2,10,18 * * *"   # 02:00, 10:00, 18:00 UTC daily
  workflow_dispatch: {}          # lets you click "Run workflow" manually in GitHub

permissions:
  contents: write   # needed so the workflow can commit updated data/*.json back to the repo

jobs:
  check-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run rule check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python check_rules.py

      - name: Commit updated data
        run: |
          git config user.name "flyscout-bot"
          git config user.email "actions@github.com"
          git add data/rule-changes.json data/predictions.json data/rates.json data/snapshots.json
          git diff --cached --quiet || git commit -m "FlyScout: automated rule check $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
