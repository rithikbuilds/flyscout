name: FlyScout Rule Check

on:
  schedule:
    - cron: "0 2,10,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run rule check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python check_rules.py

      - name: Commit updated data
        run: |
          git config user.name "flyscout-bot"
          git config user.email "actions@github.com"
          git add data/rule-changes.json data/predictions.json data/rates.json data/snapshots.json
          git diff --cached --quiet || git commit -m "FlyScout: automated rule check $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
